services:
  campuslands-package:
    build:
      context: .
      dockerfile: Dockerfile.package
      args:
        REPOSITORY_NAME: campuslands-dev-php
        REPOSITORY_URL: https://github.com/anndreloopez012/campuslands-dev-php
    image: ghcr.io/anndreloopez012/campuslands-dev-php:local
    container_name: campuslands-dev-php-docs
    ports:
      - "8080:80"
    restart: unless-stopped
